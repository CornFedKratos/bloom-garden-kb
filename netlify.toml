[build]
  command = "npm run build"
  publish = "out"
  ignore = "bash scripts/netlify-ignore.sh"

[build.environment]
  NODE_VERSION = "18"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NEXT_PUBLIC_SUPABASE_URL = "REPLACE_WITH_NEW_KEY"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "REPLACE_WITH_NEW_KEY"
